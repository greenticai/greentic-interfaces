version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    groups:
      greentic-interfaces-stack:
        patterns:
          - "greentic-interfaces"
          - "greentic-interfaces-*"
      wasmtime-stack:
        patterns:
          - "wasmtime"
          - "wasmtime-*"
      wit-bindgen-stack:
        patterns:
          - "wit-bindgen"
          - "wit-bindgen-*"
          - "wit-parser"
