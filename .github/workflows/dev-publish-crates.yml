name: Dev Publish crates (interfaces)

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Lint & Test
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --all-features
          cargo test --workspace --all-features -- --nocapture

  publish:
    name: Publish dev crates to CodeArtifact
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get CodeArtifact Token
        run: |
          token=$(aws codeartifact get-authorization-token \
            --domain ${{ secrets.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ secrets.CODEARTIFACT_DOMAIN_OWNER }} \
            --region ${{ secrets.AWS_REGION }} \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$token"
          echo "CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TOKEN=$token" >> $GITHUB_ENV

      - name: Configure CodeArtifact Registry
        shell: bash
        run: |
          set -euo pipefail
          endpoint=$(aws codeartifact get-repository-endpoint \
            --domain "${{ secrets.CODEARTIFACT_DOMAIN }}" \
            --domain-owner "${{ secrets.CODEARTIFACT_DOMAIN_OWNER }}" \
            --repository greentic \
            --format cargo \
            --region "${{ secrets.AWS_REGION }}" \
            --query repositoryEndpoint \
            --output text)
          mkdir -p .cargo
          cat > .cargo/config.toml <<EOF
[registries.corp-artifacts-greentic]
index = "sparse+${endpoint}"
credential-provider = "cargo:token"
EOF

      - name: Set dev version
        shell: bash
        run: |
          set -euo pipefail
          base_version=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          dev_version="${base_version}-dev.${GITHUB_RUN_NUMBER}"
          echo "Using dev version: ${dev_version}"
          sed -i -E "0,/^version = \"[^\"]+\"/s//version = \"${dev_version}\"/" Cargo.toml

      - name: Publish to CodeArtifact
        shell: bash
        run: |
          set -euo pipefail
          cargo publish -p greentic-interfaces --registry corp-artifacts-greentic --allow-dirty
          sleep 5
          cargo publish -p greentic-interfaces-guest --registry corp-artifacts-greentic --allow-dirty
          sleep 5
          cargo publish -p greentic-interfaces-wasmtime --registry corp-artifacts-greentic --allow-dirty
          sleep 5
          cargo publish -p greentic-interfaces-host --registry corp-artifacts-greentic --allow-dirty
