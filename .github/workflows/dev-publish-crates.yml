name: Dev Publish crates (interfaces)

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          toolchain: 1.91.0
      - run: rustc --version