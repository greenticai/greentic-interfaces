name: CI
on:
  workflow_call:
  pull_request:
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/pr-ci.yml@main
    with:
      variant: host
      rust-version: "1.95.0"
      setup-script: |
        rustup override set 1.95.0
