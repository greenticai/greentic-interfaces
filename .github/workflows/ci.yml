name: CI
on:
  workflow_call:
  pull_request:
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main
    with:
      rust-version: "1.95.0"
      setup-script: |
        rustup override set 1.95.0
      run-semver-checks: true
      semver-checks-package: "greentic-interfaces,greentic-interfaces-guest,greentic-interfaces-host,greentic-interfaces-wasmtime"
